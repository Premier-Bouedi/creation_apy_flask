<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} | Ma Première App Flask</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h1>{{ title }}</h1>
        <p>Voici une sélection de titres qui m'ont particulièrement marqué :</p>
        
        <ul class="games-list">
            {% for game in games %}
            <li class="game-item">{{ game }}</li>
            {% endfor %}
        </ul>

        <div class="nav-links">
            <a href="/" class="btn btn-secondary">Retour à l'accueil</a>
        </div>
        <footer>Exploration vidéoludique avec Flask</footer>
    </div>
</body>
</html>
